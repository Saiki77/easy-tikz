<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Easy TikZ - 2D plots">
  <defs>
    <style>
      .bg { fill: #F4F5F7; }
      .frame { stroke: #E2E5EA; stroke-width: 1.25; fill: none; }
      .title { font: 700 78px/1.0 -apple-system, "SF Pro Display", Inter, system-ui, sans-serif; fill: #0F172A; letter-spacing: -0.02em; }
      .sub { font: 400 22px/1.45 -apple-system, "SF Pro Display", Inter, system-ui, sans-serif; fill: #334155; }
      .pill { font: 500 13px/1 ui-monospace, "SF Mono", Menlo, monospace; fill: #475569; }
      .crumb { font: 400 16px/1 ui-monospace, "SF Mono", Menlo, monospace; fill: #64748B; letter-spacing: 0.04em; }
      .brand { font: 700 22px/1 -apple-system, "SF Pro Display", Inter, system-ui, sans-serif; fill: #0F172A; }
      .tick { font: 400 13px/1 ui-monospace, "SF Mono", Menlo, monospace; fill: #94A3B8; }
      .axislbl { font: 500 14px/1 -apple-system, "SF Pro Display", Inter, system-ui, sans-serif; fill: #475569; }
      .accent { fill: #2563EB; }
      .grid { stroke: #E5E8EE; stroke-width: 1; }
      .axis { stroke: #0F172A; stroke-width: 2; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="800"/>
  <line class="frame" x1="60" y1="80" x2="1140" y2="80"/>
  <line class="frame" x1="60" y1="720" x2="1140" y2="720"/>

  <!-- Brand strip -->
  <g transform="translate(60 40)">
    <rect width="40" height="40" rx="8" fill="#0F172A"/>
    <g stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 28 L31 28"/>
      <path d="M9 28 L9 10"/>
      <path d="M11 24 Q20 -2 29 24"/>
    </g>
    <text class="brand" x="56" y="27">Easy TikZ</text>
  </g>
  <text class="crumb" x="1140" y="50" text-anchor="end">02 / 05</text>

  <!-- Left column: copy -->
  <g transform="translate(80 220)">
    <text class="title" x="0" y="0">Plot anything.</text>
    <text class="title accent" x="0" y="88">Live.</text>
    <text class="sub" x="0" y="160">Any one-variable expression. Adjustable color,</text>
    <text class="sub" x="0" y="190">thickness, dashing, fill patterns. Tangents and</text>
    <text class="sub" x="0" y="220">extrema with one toggle. Parametric. Polar.</text>

    <g transform="translate(0 270)">
      <rect width="430" height="32" rx="6" fill="#EAECF1"/>
      <text class="pill" x="14" y="21">sin(x) · x^3 - 3·x · (cos t, sin t) · r = 1 + cos θ</text>
    </g>
  </g>

  <!-- Right column: chart -->
  <g transform="translate(640 145)">
    <rect width="470" height="470" rx="14" fill="#FFFFFF" stroke="#E2E5EA"/>
    <g transform="translate(50 35)">
      <!-- grid lines (light) -->
      <g class="grid">
        <line x1="0" y1="60" x2="370" y2="60"/>
        <line x1="0" y1="135" x2="370" y2="135"/>
        <line x1="0" y1="285" x2="370" y2="285"/>
        <line x1="0" y1="360" x2="370" y2="360"/>
        <line x1="62" y1="0" x2="62" y2="400"/>
        <line x1="247" y1="0" x2="247" y2="400"/>
        <line x1="340" y1="0" x2="340" y2="400"/>
      </g>
      <!-- axes -->
      <line class="axis" x1="0" y1="210" x2="370" y2="210"/>
      <line class="axis" x1="155" y1="0" x2="155" y2="400"/>
      <polygon points="370,210 360,205 360,215" fill="#0F172A"/>
      <polygon points="155,0 150,12 160,12" fill="#0F172A"/>

      <!-- tick labels (right below the x-axis line, not the chart panel) -->
      <text class="tick" x="155" y="226" text-anchor="middle">0</text>
      <text class="tick" x="247" y="226" text-anchor="middle">π</text>
      <text class="tick" x="340" y="226" text-anchor="middle">2π</text>
      <text class="tick" x="62" y="226" text-anchor="middle">-π</text>
      <text class="tick" x="146" y="64" text-anchor="end">1</text>
      <text class="tick" x="146" y="364" text-anchor="end">-1</text>

      <!-- sin(x) curve -->
      <path d="M0 270 C 25 90, 70 90, 92 210 C 115 330, 160 330, 185 210 C 207 90, 252 90, 277 210 C 300 330, 345 330, 370 210"
            fill="none" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round"/>
      <!-- tangent line marker -->
      <line x1="160" y1="60" x2="350" y2="380" stroke="#0F172A" stroke-width="1.6" stroke-dasharray="6 4"/>
      <circle cx="247" cy="210" r="5" fill="#0F172A"/>
      <!-- extrema markers -->
      <circle cx="92" cy="118" r="4.5" fill="#2563EB"/>
      <circle cx="185" cy="302" r="4.5" fill="#2563EB"/>
      <circle cx="277" cy="118" r="4.5" fill="#2563EB"/>

      <text class="axislbl" x="370" y="232">x</text>
      <text class="axislbl" x="170" y="14">y</text>
    </g>
    <text class="pill" x="235" y="445" text-anchor="middle">sin(x) · domain 0 : 2π · extrema · tangent</text>
  </g>

  <!-- Footer -->
  <text class="crumb" x="60" y="760">github.com/Saiki77/easy-tikz</text>
  <text class="crumb" x="1140" y="760" text-anchor="end">MIT licensed</text>
</svg>
