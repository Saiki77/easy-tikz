<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="TikZ Graph Helper logo">
  <title>TikZ Graph Helper</title>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1d2e"/>
      <stop offset="1" stop-color="#2a2741"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <g stroke="#3a3654" stroke-width="2" opacity="0.6">
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="240" x2="432" y2="240"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="160" y1="80" x2="160" y2="400"/>
    <line x1="240" y1="80" x2="240" y2="400"/>
    <line x1="320" y1="80" x2="320" y2="400"/>
    <line x1="400" y1="80" x2="400" y2="400"/>
  </g>

  <g stroke="#9690b8" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="80" y1="400" x2="432" y2="400"/>
    <line x1="80" y1="80" x2="80" y2="400"/>
  </g>
  <polygon points="432,400 414,390 414,410" fill="#9690b8"/>
  <polygon points="80,80 70,98 90,98" fill="#9690b8"/>

  <path d="M 80 400 Q 256 -240 432 400"
        stroke="url(#curveGrad)"
        stroke-width="14"
        fill="none"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <circle cx="256" cy="80" r="18" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="256" cy="80" r="8" fill="#1f1d2e"/>
</svg>
